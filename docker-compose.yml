services:
  mysql:
    image: mysql:8.0
    container_name: grade-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Grade@2026Sec
      MYSQL_DATABASE: grade_system
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "3307:3306"
    networks:
      - grade-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: grade-backend:latest
    container_name: grade-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: grade-mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASS: Grade@2026Sec
      JWT_SECRET: GradeSystem2026SecretKeyForJWTTokenGenerationMustBeLongEnough256Bits
    volumes:
      - upload-data:/app/uploads
      - backend-logs:/app/logs
    ports:
      - "8080:8080"
    networks:
      - grade-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: grade-nginx:latest
    container_name: grade-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - grade-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  mysql-data:
  upload-data:
  backend-logs:

networks:
  grade-net:
    driver: bridge
