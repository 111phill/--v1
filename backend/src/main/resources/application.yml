server:
  port: 8080
  shutdown: graceful

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/grade_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASS:Grade@2026Sec}
    hikari:
      maximum-pool-size: 20
      connection-timeout: 30000
      initialization-fail-timeout: 60000
  servlet:
    multipart:
      max-file-size: 10MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.grade.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:GradeSystem2026SecretKeyForJWTTokenGenerationMustBeLongEnough256Bits}
  expiration: 7200

logging:
  level:
    com.grade: DEBUG
